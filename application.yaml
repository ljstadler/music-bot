lavalink:
    plugins:
        - dependency: "dev.lavalink.youtube:youtube-plugin:1.4.0"
    server:
        sources:
            youtube: false
            bandcamp: true
            soundcloud: true
            twitch: true
            vimeo: true
            nico: true
            http: true
            local: false

plugins:
    youtube:
        enabled: true
        allowSearch: true
        allowDirectVideoIds: true
        allowDirectPlaylistIds: true
        clients:
            - MUSIC
            - WEB
